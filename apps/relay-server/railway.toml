# Railway configuration
# Dokumentasi: https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"
buildCommand = "cd apps/relay-server && npm install && npm run build"

[deploy]
startCommand = "node apps/relay-server/dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 30