name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter=@im/core --filter=@im/crypto --filter=@im/db-schema

      - name: Run unit tests
        run: pnpm test --filter=@im/core --filter=@im/crypto

      - name: Typecheck desktop
        run: pnpm typecheck --filter=desktop

      - name: Typecheck relay server
        run: pnpm typecheck --filter=relay-server
